name: Claude CI Fix

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  fix:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Fix CI failure
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            The CI workflow failed on this branch.
            1. Read the CI workflow failure logs using gh to identify what failed.
            2. Identify the root cause in the source code.
            3. Create a fix branch from the failing branch, commit the fix, and open a PR.
          claude_args: |
            --allowedTools "Edit,Write,Read,Glob,Grep,Bash(git:*),Bash(gh:*)"
