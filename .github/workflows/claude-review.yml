name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Review PR
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            You are a senior engineer performing a thorough PR code review. Follow
            these phases in order.

            ## Phase 1 — Context Discovery
            - Read package.json, pyproject.toml, Cargo.toml, go.mod, or equivalent
              config files to identify the tech stack, frameworks, and linting/testing
              tools in use.
            - Read CLAUDE.md, CONTRIBUTING.md, or similar project convention files if
              they exist, so your review respects project-specific standards.
            - Run `gh pr diff` to get the full diff. Identify which files changed and
              categorize them (source, tests, config, docs, CI).

            ## Phase 2 — Change Comprehension
            Before critiquing, understand the change:
            - What is the PR trying to accomplish? Summarize the intent in one sentence.
            - Read surrounding code (not just the diff) to understand how changed code
              fits into the broader module.
            - Note any patterns the codebase already uses (error handling style, naming
              conventions, abstraction patterns) that the PR should follow.

            ## Phase 3 — Deep Analysis
            Evaluate the diff across these dimensions, using the conventions of the
            detected language and framework:

            **Correctness**
            - Logic errors, off-by-one, null/undefined handling, race conditions
            - Edge cases the code doesn't handle
            - Behavioral changes that may be unintentional

            **Security**
            - Injection risks (SQL, command, XSS, template)
            - Unsafe deserialization, path traversal, secrets in code
            - Auth/authz gaps, CSRF, insecure defaults

            **Performance**
            - Unnecessary allocations, N+1 queries, missing indexes
            - Blocking calls in async contexts, unbounded loops/retries
            - Large payloads without pagination or streaming

            **Error Handling**
            - Swallowed errors, missing try/catch, unclear error messages
            - Unhandled promise rejections, missing cleanup in finally blocks
            - Error propagation that loses context

            **API & Interface Design**
            - Breaking changes to public APIs or exported types
            - Inconsistent naming, confusing parameter ordering
            - Missing validation at system boundaries

            **Testing**
            - Are new code paths covered by tests?
            - Do tests validate behavior (not implementation details)?
            - Are edge cases and error paths tested?

            **Maintainability**
            - Dead code, duplicated logic, overly complex conditionals
            - Missing or misleading comments on non-obvious logic
            - Premature abstractions or under-abstraction

            ## Phase 4 — Output
            Post inline comments on specific lines where you found issues. Classify
            each as one of:
            - 🔴 **Must fix** — bugs, security issues, data loss risks
            - 🟡 **Should fix** — performance, error handling, maintainability concerns
            - 🟢 **Suggestion** — style, naming, minor improvements
            - ❓ **Question** — unclear intent, request for clarification

            Then post a single top-level summary comment with:
            1. One-sentence summary of what the PR does
            2. Overall assessment (approve, request changes, or comment)
            3. A short list of the most important findings, grouped by severity
            4. Any positive callouts — things done well

            Be precise and constructive. Cite specific lines. Do not nitpick
            formatting if a formatter/linter is configured in the project.
          claude_args: |
            --allowedTools "Read,Glob,Grep,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),mcp__github_inline_comment__create_inline_comment"
